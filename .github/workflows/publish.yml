name: Publish packages to npm

on:
  workflow_dispatch:
  push:
    tags:
      # 只发布 tag
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # 安装依赖
      - name: Install
        run: pnpm install --frozen-lockfile
      # 确保 tag 提交在 main 分支上，避免从其他分支打 tag 误发 npm。
      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      # 测试代码
      - name: Test
        run: pnpm exec turbo run test
      # 构建代码
      - name: Build Packages
        run: pnpm run build:packages
      # 测试发布 (Dry Run)
      - name: Dry Run Publish to npm
        run: pnpm publish -r --filter "@jsonup/*" --filter "!@jsonup/docs" --access public --registry https://registry.npmjs.org/ --no-git-checks --dry-run
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 正式发布到 npm
      - name: Publish to npm
        run: pnpm publish -r --filter "@jsonup/*" --filter "!@jsonup/docs" --access public --registry https://registry.npmjs.org/ --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
          # NPM 令牌
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
